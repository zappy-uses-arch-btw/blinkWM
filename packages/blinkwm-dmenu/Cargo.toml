[package]
name = "blinkwm-dmenu"
version = "0.1.0"
edition = "2024"

[dependencies]
x11rb = { version = "0.13.2", features = ["all-extensions"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1.0"
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
nix = { version = "0.29", features = ["user"] }
blinkwm-common = { path = "../blinkwm-common" }
walkdir = "2.5"
fuzzy-matcher = "0.3"
