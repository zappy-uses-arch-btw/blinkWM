[package]
name = "blinkwm"
version = "0.1.0"
edition = "2024"

[dependencies]
x11rb = { version = "0.13.2", features = ["all-extensions"] }
calloop = "0.14"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1.0", features = ["derive"] }
toml = "0.8"
thiserror = "2.0"
anyhow = "1.0"
regex = "1.11"
signal-hook = "0.3"
dirs = "6.0"
nix = { version = "0.29", features = ["user"] }
blinkwm-common = { path = "../blinkwm-common" }
serde_json = "1.0"
